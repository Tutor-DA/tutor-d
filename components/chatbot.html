<!-- TutorDA Chatbot Widget -->
<style>
/* ── Chatbot Variables ── */
.tda-chat-widget * { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Floating Button ── */
#tda-chat-fab {
  position: fixed;
  bottom: 28px;
  left: 28px;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff8c00, #ffd700);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  z-index: 9000;
  box-shadow: 0 4px 24px rgba(255,140,0,.55);
  transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
  animation: tda-pulse 3s ease-in-out infinite;
}
#tda-chat-fab:hover {
  transform: scale(1.12);
  box-shadow: 0 6px 32px rgba(255,140,0,.75);
  animation: none;
}
@keyframes tda-pulse {
  0%,100% { box-shadow: 0 4px 24px rgba(255,140,0,.55); }
  50%      { box-shadow: 0 4px 36px rgba(255,140,0,.9); }
}

/* ── Notification dot ── */
#tda-chat-dot {
  position: absolute;
  top: 4px; right: 4px;
  width: 12px; height: 12px;
  background: #22c55e;
  border: 2px solid #0d0d1a;
  border-radius: 50%;
  animation: tda-blink 2s ease-in-out infinite;
}
@keyframes tda-blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }

/* ── Chat Panel ── */
#tda-chat-panel {
  position: fixed;
  bottom: 100px;
  left: 28px;
  width: 360px;
  max-height: 520px;
  background: #0d0d1a;
  border: 1px solid rgba(255,140,0,.25);
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,.7), 0 0 0 1px rgba(255,140,0,.08);
  display: flex;
  flex-direction: column;
  z-index: 8999;
  overflow: hidden;
  transform-origin: bottom left;
  transform: scale(0) translateY(20px);
  opacity: 0;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .25s ease;
  font-family: 'Poppins', sans-serif;
}
#tda-chat-panel.open {
  transform: scale(1) translateY(0);
  opacity: 1;
}

/* ── Chat Header ── */
.tda-chat-header {
  background: linear-gradient(135deg, rgba(255,140,0,.15), rgba(255,215,0,.08));
  border-bottom: 1px solid rgba(255,140,0,.18);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.tda-chat-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff8c00, #ffd700);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
  box-shadow: 0 0 14px rgba(255,140,0,.4);
}
.tda-chat-header-info { flex: 1; }
.tda-chat-header-name {
  font-family: 'Orbitron', sans-serif;
  font-size: .8rem;
  font-weight: 700;
  color: #ff8c00;
  letter-spacing: .04em;
}
.tda-chat-header-status {
  font-size: .7rem;
  color: #22c55e;
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 2px;
}
.tda-chat-header-status::before {
  content: '';
  width: 6px; height: 6px;
  background: #22c55e;
  border-radius: 50%;
  display: inline-block;
}
.tda-chat-close {
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  color: #7878a0;
  width: 30px; height: 30px;
  border-radius: 50%;
  cursor: pointer;
  font-size: .9rem;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
}
.tda-chat-close:hover { border-color: #ff8c00; color: #ff8c00; }

/* ── Messages ── */
.tda-chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}
.tda-chat-messages::-webkit-scrollbar { width: 4px; }
.tda-chat-messages::-webkit-scrollbar-track { background: transparent; }
.tda-chat-messages::-webkit-scrollbar-thumb { background: rgba(255,140,0,.25); border-radius: 2px; }

/* ── Message bubbles ── */
.tda-msg {
  max-width: 85%;
  font-size: .83rem;
  line-height: 1.55;
  animation: tda-msg-in .25s ease;
}
@keyframes tda-msg-in { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:none;} }

.tda-msg.bot { align-self: flex-start; }
.tda-msg.user { align-self: flex-end; }

.tda-msg-bubble {
  padding: 10px 14px;
  border-radius: 14px;
  line-height: 1.6;
}
.tda-msg.bot .tda-msg-bubble {
  background: #141428;
  border: 1px solid rgba(255,140,0,.15);
  color: #e8e8ff;
  border-radius: 4px 14px 14px 14px;
}
.tda-msg.user .tda-msg-bubble {
  background: linear-gradient(135deg, rgba(255,140,0,.25), rgba(255,215,0,.15));
  border: 1px solid rgba(255,140,0,.3);
  color: #fff;
  border-radius: 14px 4px 14px 14px;
}
.tda-msg-bubble strong { color: #ffd700; }
.tda-msg-bubble br { display: block; margin: 3px 0; }

/* ── Typing indicator ── */
.tda-typing .tda-msg-bubble {
  display: flex; align-items: center; gap: 5px;
  padding: 12px 16px;
}
.tda-typing-dot {
  width: 7px; height: 7px;
  background: #ff8c00;
  border-radius: 50%;
  animation: tda-bounce .9s ease-in-out infinite;
}
.tda-typing-dot:nth-child(2) { animation-delay: .15s; }
.tda-typing-dot:nth-child(3) { animation-delay: .3s; }
@keyframes tda-bounce { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-7px);} }

/* ── Quick Replies ── */
.tda-quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 0 16px 12px;
  flex-shrink: 0;
}
.tda-qr-btn {
  padding: 5px 12px;
  background: rgba(255,140,0,.08);
  border: 1px solid rgba(255,140,0,.22);
  border-radius: 999px;
  color: #ff8c00;
  font-size: .72rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .18s;
  font-family: 'Poppins', sans-serif;
  white-space: nowrap;
}
.tda-qr-btn:hover { background: #ff8c00; color: #000; }

/* ── Input area ── */
.tda-chat-input-row {
  border-top: 1px solid rgba(255,140,0,.12);
  padding: 12px 14px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
  background: rgba(255,255,255,.02);
}
#tda-chat-input {
  flex: 1;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,140,0,.18);
  border-radius: 10px;
  padding: 9px 14px;
  color: #e8e8ff;
  font-family: 'Poppins', sans-serif;
  font-size: .82rem;
  outline: none;
  transition: border-color .2s;
}
#tda-chat-input:focus { border-color: #ff8c00; }
#tda-chat-input::placeholder { color: #7878a0; }
#tda-chat-send {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #ff8c00, #ffd700);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  color: #0d0d1a;
  transition: opacity .2s, transform .2s;
  flex-shrink: 0;
}
#tda-chat-send:hover { opacity: .85; transform: scale(1.08); }

/* ── Responsive ── */
@media (max-width: 480px) {
  #tda-chat-panel { width: calc(100vw - 24px); left: 12px; }
  #tda-chat-fab  { bottom: 20px; left: 20px; }
}
</style>

/* ══════════════════════════════════════════════
   CHATBOT LOGIC
══════════════════════════════════════════════ */
var isOpen = false;
var greeted = false;

function tdaChatToggle() {
  var panel = document.getElementById('tda-chat-panel');
  isOpen = !isOpen;
  panel.classList.toggle('open', isOpen);
  if (isOpen) {
    if (!greeted) {
      greeted = true;
      setTimeout(function() {
        tdaBotReply(KB[0]);
      }, 400);
    }
    setTimeout(function() {
      document.getElementById('tda-chat-input').focus();
    }, 350);
    document.getElementById('tda-chat-dot').style.display = 'none';
  }
}

function tdaChatSend() {
  var input = document.getElementById('tda-chat-input');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  tdaAddMsg('user', text);
  document.getElementById('tda-qr-row').innerHTML = '';
  tdaShowTyping();
  setTimeout(function() {
    tdaRemoveTyping();
    var response = tdaMatch(text.toLowerCase());
    tdaBotReply(response);
  }, 700);
}

function tdaAddMsg(role, html) {
  var msgs = document.getElementById('tda-chat-msgs');
  var div = document.createElement('div');
  div.className = 'tda-msg ' + role;
  var bubble = document.createElement('div');
  bubble.className = 'tda-msg-bubble';
  bubble.innerHTML = html;
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function tdaShowTyping() {
  var msgs = document.getElementById('tda-chat-msgs');
  var div = document.createElement('div');
  div.className = 'tda-msg bot tda-typing';
  div.id = 'tda-typing-indicator';
  div.innerHTML = '<div class="tda-msg-bubble"><div class="tda-typing-dot"></div><div class="tda-typing-dot"></div><div class="tda-typing-dot"></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function tdaRemoveTyping() {
  var t = document.getElementById('tda-typing-indicator');
  if (t) t.remove();
}

function tdaBotReply(entry) {
  tdaAddMsg('bot', entry.reply);
  var qr = document.getElementById('tda-qr-row');
  qr.innerHTML = '';
  if (entry.qr) {
    entry.qr.forEach(function(label) {
      var btn = document.createElement('button');
      btn.className = 'tda-qr-btn';
      btn.textContent = label;
      btn.onclick = function() {
        tdaAddMsg('user', label);
        qr.innerHTML = '';
        tdaShowTyping();
        setTimeout(function() {
          tdaRemoveTyping();
          tdaBotReply(tdaMatch(label.toLowerCase()));
        }, 600);
      };
      qr.appendChild(btn);
    });
  }
}

function tdaMatch(text) {
  for (var i = 0; i < KB.length - 1; i++) {
    for (var j = 0; j < KB[i].keys.length; j++) {
      if (text.indexOf(KB[i].keys[j]) !== -1) return KB[i];
    }
  }
  return KB[KB.length - 1]; // fallback
}

/* Show notification dot after 3 seconds if not opened */
setTimeout(function() {
  if (!isOpen) {
    var dot = document.getElementById('tda-chat-dot');
    if (dot) dot.style.display = 'block';
  }
}, 3000);

/* Make toggle global */
window.tdaChatToggle = tdaChatToggle;
window.tdaChatSend   = tdaChatSend;

})();
</script>
