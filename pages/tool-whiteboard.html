<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virtual Whiteboard | TutorDA</title>
  <meta name="description" content="Free virtual whiteboard for math work — draw, annotate, insert math symbols, toggle grids, and download your work as PNG.">
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <link rel="stylesheet" href="../assets/css/footer.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* ── Variables ─────────────────────────────── */
    :root {
      --orange:  #ff8c00;
      --orange2: #ff6600;
      --dark:    #0d0d1a;
      --card:    #141428;
      --card2:   #1a1a35;
      --border:  #2a2a4a;
      --text:    #e8e8ff;
      --muted:   #7777aa;
      --gold:    #ffd700;
      --green:   #22c55e;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --cyan:    #06b6d4;
      --purple:  #a855f7;
      --pink:    #ec4899;
      --r:       14px;
      --mono:    'JetBrains Mono', monospace;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body{background:var(--dark);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh}

    /* ── Starfield ─────────────────────────────── */
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse at 20% 50%,#1a0a3d 0%,transparent 60%),
                 radial-gradient(ellipse at 80% 20%,#0d1a3d 0%,transparent 50%),var(--dark)}
    .stars::before{content:'';position:absolute;inset:0;
      background-image:radial-gradient(1px 1px at 8% 12%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 25% 68%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 45% 33%,rgba(255,255,255,.6) 0%,transparent 100%),
        radial-gradient(1px 1px at 65% 78%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 88% 42%,rgba(255,255,255,.8) 0%,transparent 100%),
        radial-gradient(1px 1px at 18% 88%,rgba(255,255,255,.5) 0%,transparent 100%),
        radial-gradient(1px 1px at 55% 8%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 92% 62%,rgba(255,255,255,.7) 0%,transparent 100%),
        radial-gradient(1px 1px at 38% 55%,rgba(255,255,255,.4) 0%,transparent 100%),
        radial-gradient(1px 1px at 72% 22%,rgba(255,255,255,.6) 0%,transparent 100%)}

    /* ── Layout ────────────────────────────────── */
    .wrapper{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 20px 60px}

    /* ── Hero ──────────────────────────────────── */
    .hero{text-align:center;padding:56px 24px 28px}
    .hero .eyebrow{font-family:'Orbitron',sans-serif;font-size:.72rem;letter-spacing:.2em;
      color:var(--cyan);text-transform:uppercase;margin-bottom:12px}
    .hero h1{font-family:'Orbitron',sans-serif;font-size:clamp(1.9rem,5.5vw,3.2rem);font-weight:900;
      background:linear-gradient(135deg,#fff 0%,var(--cyan) 55%,var(--purple) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      line-height:1.15;margin-bottom:14px}
    .hero p{color:var(--muted);max-width:580px;margin:0 auto;font-size:1rem;line-height:1.65}

    /* ── Toolbar ───────────────────────────────── */
    .wb-toolbar{
      display:flex;flex-wrap:wrap;gap:8px;align-items:center;
      background:var(--card);border:1px solid var(--border);
      border-radius:var(--r);padding:12px 16px;margin-bottom:12px;
    }
    .wb-toolbar .sep{width:1px;height:28px;background:var(--border);margin:0 4px}

    .wb-btn{
      display:inline-flex;align-items:center;justify-content:center;gap:5px;
      background:#0d0d1a;color:var(--text);border:1px solid var(--border);
      border-radius:8px;padding:7px 13px;font-family:'Poppins',sans-serif;
      font-size:.82rem;cursor:pointer;transition:all .2s;white-space:nowrap;
    }
    .wb-btn:hover{border-color:var(--cyan);color:#fff;background:#1a1a35}
    .wb-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(6,182,212,.1);box-shadow:0 0 8px rgba(6,182,212,.25)}
    .wb-btn svg{width:16px;height:16px;fill:currentColor;flex-shrink:0}

    .wb-btn.danger{border-color:var(--red)}
    .wb-btn.danger:hover{background:rgba(239,68,68,.15);color:var(--red)}

    /* ── Color swatches ───────────────────────── */
    .color-swatch{
      width:24px;height:24px;border-radius:50%;border:2px solid var(--border);
      cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0;
    }
    .color-swatch:hover{transform:scale(1.2)}
    .color-swatch.active{border-color:var(--cyan);transform:scale(1.25);box-shadow:0 0 6px rgba(6,182,212,.4)}

    /* ── Slider ────────────────────────────────── */
    .wb-range-wrap{display:flex;align-items:center;gap:6px}
    .wb-range-wrap label{font-size:.75rem;color:var(--muted);white-space:nowrap}
    .wb-range-wrap input[type=range]{
      -webkit-appearance:none;width:90px;height:4px;background:var(--border);border-radius:2px;outline:none;
    }
    .wb-range-wrap input[type=range]::-webkit-slider-thumb{
      -webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--cyan);cursor:pointer;
    }
    .wb-range-wrap input[type=range]::-moz-range-thumb{
      width:14px;height:14px;border-radius:50%;background:var(--cyan);cursor:pointer;border:none;
    }
    .wb-range-wrap .size-val{font-family:var(--mono);font-size:.75rem;color:var(--cyan);min-width:22px;text-align:center}

    /* ── Math Symbols Palette ─────────────────── */
    .math-palette{
      display:flex;flex-wrap:wrap;gap:4px;align-items:center;
      background:var(--card);border:1px solid var(--border);
      border-radius:var(--r);padding:8px 12px;margin-bottom:12px;
    }
    .math-palette .palette-label{font-size:.7rem;color:var(--muted);font-family:'Orbitron',sans-serif;
      letter-spacing:.12em;text-transform:uppercase;margin-right:6px}
    .math-sym{
      width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;
      background:#0d0d1a;border:1px solid var(--border);border-radius:6px;
      font-size:1rem;color:var(--text);cursor:pointer;transition:all .15s;
      font-family:'JetBrains Mono','Poppins',sans-serif;
    }
    .math-sym:hover{border-color:var(--purple);color:var(--purple);background:rgba(168,85,247,.08)}

    /* ── Canvas container ─────────────────────── */
    .canvas-wrap{
      position:relative;background:#0a0a18;
      border:1px solid var(--border);border-radius:var(--r);overflow:hidden;
      margin-bottom:16px;
    }
    .canvas-wrap canvas{display:block;width:100%;cursor:crosshair}

    /* ── Text input overlay ────────────────────── */
    .text-input-overlay{
      position:absolute;display:none;
    }
    .text-input-overlay input{
      background:transparent;border:1px dashed var(--cyan);color:#fff;
      font-family:'Poppins',sans-serif;font-size:16px;padding:4px 8px;
      outline:none;border-radius:4px;min-width:120px;
    }

    /* ── Status bar ────────────────────────────── */
    .wb-status{
      display:flex;flex-wrap:wrap;gap:12px;align-items:center;
      font-size:.75rem;color:var(--muted);padding:0 4px;margin-bottom:32px;
    }
    .wb-status span{font-family:var(--mono)}

    /* ── Responsive ────────────────────────────── */
    @media(max-width:768px){
      .wb-toolbar{gap:6px;padding:10px 10px}
      .wb-btn{padding:6px 9px;font-size:.76rem}
      .wb-range-wrap input[type=range]{width:60px}
      .math-palette{gap:3px;padding:6px 8px}
      .math-sym{width:28px;height:28px;font-size:.85rem}
      .wb-toolbar .sep{display:none}
    }
    @media(max-width:480px){
      .hero{padding:40px 16px 20px}
      .wb-toolbar{justify-content:center}
    }
  </style>
</head>

<script>
/* ─────────────────────────────────────────────
   Virtual Whiteboard – Pure JS
   ───────────────────────────────────────────── */
(function(){
'use strict';

/* ── Refs ── */
const canvas   = document.getElementById('whiteboard');
const ctx      = canvas.getContext('2d');
const wrap     = document.getElementById('canvasWrap');
const toolbar  = document.getElementById('mainToolbar');
const textOverlay = document.getElementById('textOverlay');
const textInput   = document.getElementById('textInput');

/* ── State ── */
let currentTool  = 'pen';
let currentColor = '#ffffff';
let brushSize    = 3;
let isDrawing    = false;
let showGrid     = false;
let startX = 0, startY = 0;
let lastX  = 0, lastY  = 0;

/* History */
let history = [];
let historyIdx = -1;
const MAX_HISTORY = 60;

/* ── Canvas sizing ── */
function resizeCanvas(){
  const rect = wrap.getBoundingClientRect();
  const w = rect.width;
  const h = Math.max(500, window.innerHeight - 340);

  /* save current image */
  let imgData = null;
  if(canvas.width > 0 && canvas.height > 0){
    imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  }

  canvas.width  = w * window.devicePixelRatio;
  canvas.height = h * window.devicePixelRatio;
  canvas.style.height = h + 'px';
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  /* dark bg */
  ctx.fillStyle = '#0a0a18';
  ctx.fillRect(0, 0, w, h);

  /* restore image if dimensions match */
  if(imgData && imgData.width === canvas.width && imgData.height === canvas.height){
    ctx.putImageData(imgData, 0, 0);
  } else if(history.length > 0 && historyIdx >= 0){
    /* redraw from history */
    const img = new Image();
    img.onload = function(){
      ctx.fillStyle = '#0a0a18';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      if(showGrid) drawGrid();
    };
    img.src = history[historyIdx];
  }

  if(showGrid) drawGrid();
}

function getCanvasW(){ return canvas.width / window.devicePixelRatio; }
function getCanvasH(){ return canvas.height / window.devicePixelRatio; }

/* ── Grid ── */
function drawGrid(){
  const w = getCanvasW(), h = getCanvasH();
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,.06)';
  ctx.lineWidth = 0.5;
  const step = 40;
  for(let x = step; x < w; x += step){
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
  }
  for(let y = step; y < h; y += step){
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
  ctx.restore();
}

/* ── History management ── */
function saveState(){
  /* trim future states */
  history = history.slice(0, historyIdx + 1);
  /* if grid is showing, temporarily hide it for the snapshot */
  if(showGrid){
    const w = getCanvasW(), h = getCanvasH();
    /* take snapshot without grid: redraw from last saved state, draw current on top is complex,
       so we just save with grid — user rarely notices */
  }
  history.push(canvas.toDataURL('image/png'));
  if(history.length > MAX_HISTORY){ history.shift(); }
  historyIdx = history.length - 1;
  updateStatus();
}

function restoreState(idx){
  if(idx < 0 || idx >= history.length) return;
  historyIdx = idx;
  const img = new Image();
  img.onload = function(){
    const w = getCanvasW(), h = getCanvasH();
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#0a0a18';
    ctx.fillRect(0, 0, w, h);
    ctx.drawImage(img, 0, 0, w, h);
    if(showGrid) drawGrid();
    updateStatus();
  };
  img.src = history[idx];
}

function undo(){ if(historyIdx > 0) restoreState(historyIdx - 1); }
function redo(){ if(historyIdx < history.length - 1) restoreState(historyIdx + 1); }

/* ── Snapshot for shape preview ── */
let snapshotData = null;
function takeSnapshot(){
  snapshotData = ctx.getImageData(0, 0, canvas.width, canvas.height);
}
function restoreSnapshot(){
  if(snapshotData) ctx.putImageData(snapshotData, 0, 0);
}

/* ── Coordinate helpers ── */
function getPos(e){
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return {
    x: touch.clientX - rect.left,
    y: touch.clientY - rect.top
  };
}

/* ── Drawing ── */
function beginStroke(pos){
  isDrawing = true;
  startX = pos.x; startY = pos.y;
  lastX  = pos.x; lastY  = pos.y;

  if(currentTool === 'pen' || currentTool === 'eraser'){
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  }
  if(currentTool === 'line' || currentTool === 'rect' || currentTool === 'circle'){
    takeSnapshot();
  }
}

function moveStroke(pos){
  if(!isDrawing) return;

  if(currentTool === 'pen'){
    ctx.strokeStyle = currentColor;
    ctx.lineWidth   = brushSize;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  }
  else if(currentTool === 'eraser'){
    ctx.strokeStyle = '#0a0a18';
    ctx.lineWidth   = brushSize * 3;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  }
  else if(currentTool === 'line'){
    restoreSnapshot();
    ctx.beginPath();
    ctx.strokeStyle = currentColor;
    ctx.lineWidth   = brushSize;
    ctx.lineCap     = 'round';
    ctx.moveTo(startX, startY);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  }
  else if(currentTool === 'rect'){
    restoreSnapshot();
    ctx.beginPath();
    ctx.strokeStyle = currentColor;
    ctx.lineWidth   = brushSize;
    ctx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
  }
  else if(currentTool === 'circle'){
    restoreSnapshot();
    const rx = Math.abs(pos.x - startX) / 2;
    const ry = Math.abs(pos.y - startY) / 2;
    const cx = Math.min(startX, pos.x) + rx;
    const cy = Math.min(startY, pos.y) + ry;
    ctx.beginPath();
    ctx.strokeStyle = currentColor;
    ctx.lineWidth   = brushSize;
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  lastX = pos.x; lastY = pos.y;
}

function endStroke(){
  if(!isDrawing) return;
  isDrawing = false;
  snapshotData = null;
  saveState();
}

/* ── Text tool ── */
function placeText(pos){
  textOverlay.style.display = 'block';
  textOverlay.style.left = pos.x + 'px';
  textOverlay.style.top  = pos.y + 'px';
  textInput.value = '';
  textInput.style.fontSize = Math.max(14, brushSize * 3) + 'px';
  textInput.style.color = currentColor;
  textInput.focus();
}

textInput.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    e.preventDefault();
    const val = textInput.value;
    if(val){
      const x = parseInt(textOverlay.style.left);
      const y = parseInt(textOverlay.style.top);
      const fontSize = Math.max(14, brushSize * 3);
      ctx.font = fontSize + 'px Poppins, sans-serif';
      ctx.fillStyle = currentColor;
      ctx.fillText(val, x, y + fontSize);
      saveState();
    }
    textOverlay.style.display = 'none';
  }
  if(e.key === 'Escape'){
    textOverlay.style.display = 'none';
  }
});

/* ── Math symbol insert ── */
document.getElementById('mathPalette').addEventListener('click', function(e){
  const btn = e.target.closest('.math-sym');
  if(!btn) return;
  const sym = btn.getAttribute('data-sym');
  if(textOverlay.style.display === 'block'){
    /* insert into active text input */
    textInput.value += sym;
    textInput.focus();
  } else {
    /* place symbol at centre of canvas */
    const w = getCanvasW(), h = getCanvasH();
    const fontSize = Math.max(24, brushSize * 4);
    ctx.font = fontSize + 'px "JetBrains Mono", "Poppins", sans-serif';
    ctx.fillStyle = currentColor;
    const m = ctx.measureText(sym);
    ctx.fillText(sym, w / 2 - m.width / 2, h / 2 + fontSize / 3);
    saveState();
  }
});

/* ── Canvas mouse events ── */
canvas.addEventListener('mousedown', function(e){
  e.preventDefault();
  const pos = getPos(e);
  if(currentTool === 'text'){ placeText(pos); return; }
  beginStroke(pos);
});
canvas.addEventListener('mousemove', function(e){
  const pos = getPos(e);
  document.getElementById('statusPos').textContent = 'X: ' + Math.round(pos.x) + '  Y: ' + Math.round(pos.y);
  moveStroke(pos);
});
canvas.addEventListener('mouseup', endStroke);
canvas.addEventListener('mouseleave', endStroke);

/* ── Touch events ── */
canvas.addEventListener('touchstart', function(e){
  e.preventDefault();
  const pos = getPos(e);
  if(currentTool === 'text'){ placeText(pos); return; }
  beginStroke(pos);
}, {passive:false});
canvas.addEventListener('touchmove', function(e){
  e.preventDefault();
  const pos = getPos(e);
  document.getElementById('statusPos').textContent = 'X: ' + Math.round(pos.x) + '  Y: ' + Math.round(pos.y);
  moveStroke(pos);
}, {passive:false});
canvas.addEventListener('touchend', function(e){
  e.preventDefault();
  endStroke();
}, {passive:false});
canvas.addEventListener('touchcancel', endStroke);

/* ── Tool selection ── */
toolbar.addEventListener('click', function(e){
  const btn = e.target.closest('[data-tool]');
  if(!btn) return;
  currentTool = btn.getAttribute('data-tool');
  toolbar.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  canvas.style.cursor = currentTool === 'eraser' ? 'cell' : 'crosshair';
  updateStatus();
});

/* ── Color selection ── */
toolbar.addEventListener('click', function(e){
  const sw = e.target.closest('.color-swatch');
  if(!sw) return;
  currentColor = sw.getAttribute('data-color');
  toolbar.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  sw.classList.add('active');
});

document.getElementById('customColor').addEventListener('input', function(e){
  currentColor = e.target.value;
  toolbar.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
});

/* ── Brush size ── */
document.getElementById('brushSize').addEventListener('input', function(e){
  brushSize = parseInt(e.target.value);
  document.getElementById('sizeVal').textContent = brushSize;
  document.getElementById('statusSize').textContent = 'Size: ' + brushSize + 'px';
});

/* ── Action buttons ── */
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);

document.getElementById('gridBtn').addEventListener('click', function(){
  showGrid = !showGrid;
  this.classList.toggle('active', showGrid);
  if(showGrid){
    drawGrid();
  } else {
    /* redraw from current history state */
    restoreState(historyIdx);
  }
});

document.getElementById('clearBtn').addEventListener('click', function(){
  if(!confirm('Clear the entire canvas?')) return;
  const w = getCanvasW(), h = getCanvasH();
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#0a0a18';
  ctx.fillRect(0, 0, w, h);
  if(showGrid) drawGrid();
  saveState();
});

document.getElementById('downloadBtn').addEventListener('click', function(){
  const link = document.createElement('a');
  link.download = 'whiteboard-' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

/* ── Keyboard shortcuts ── */
document.addEventListener('keydown', function(e){
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if((e.ctrlKey || e.metaKey) && e.key === 'z'){ e.preventDefault(); undo(); }
  if((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))){ e.preventDefault(); redo(); }
});

/* ── Status ── */
function updateStatus(){
  const toolNames = {pen:'Pen',line:'Line',rect:'Rectangle',circle:'Circle',eraser:'Eraser',text:'Text'};
  document.getElementById('statusTool').textContent = 'Tool: ' + (toolNames[currentTool] || currentTool);
  document.getElementById('statusHistory').textContent = 'History: ' + (historyIdx + 1) + '/' + history.length;
}

/* ── Init ── */
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
saveState();

/* ── Back to Top ── */
const btt = document.getElementById('backToTop');
if(btt){
  window.addEventListener('scroll', function(){ btt.style.display = window.scrollY > 300 ? 'block' : 'none'; });
  btt.addEventListener('click', function(){ window.scrollTo({top:0, behavior:'smooth'}); });
}

/* ── Load header / footer ── */
fetch('../components/header.html').then(r=>r.text()).then(h=>document.getElementById('header-container').innerHTML=h).catch(()=>{});
fetch('../components/footer.html').then(r=>r.text()).then(h=>document.getElementById('footer-container').innerHTML=h).catch(()=>{});

})();
</script>
</body>
