<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Math Tutor | TutorDA</title>
  <meta name="description" content="Free AI Math Tutor — ask any math question and get step-by-step guidance, hints, and explanations powered by Claude.">
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <link rel="stylesheet" href="../assets/css/footer.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- MathJax -->
  <script>
  MathJax = {
    tex: {
      inlineMath: [['$','$']],
      displayMath: [['$$','$$']],
      packages: {'[+]': ['ams']}
    },
    options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] },
    startup: { typeset: false }
  };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.min.js" id="MathJax-script" async></script>

  <style>
    /* ── Variables ─────────────────────────────── */
    :root {
      --orange:  #ff8c00;
      --orange2: #ff6600;
      --dark:    #0d0d1a;
      --card:    #141428;
      --card2:   #1a1a35;
      --border:  #2a2a4a;
      --text:    #e8e8ff;
      --muted:   #7777aa;
      --gold:    #ffd700;
      --green:   #22c55e;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --cyan:    #06b6d4;
      --purple:  #a855f7;
      --pink:    #ec4899;
      --r:       14px;
      --mono:    'JetBrains Mono', monospace;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--dark);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh}

    /* ── Starfield ─────────────────────────────── */
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse at 20% 50%,#1a0a3d 0%,transparent 60%),
                 radial-gradient(ellipse at 80% 20%,#0d1a3d 0%,transparent 50%),var(--dark)}
    .stars::before{content:'';position:absolute;inset:0;
      background-image:radial-gradient(1px 1px at 8% 12%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 25% 68%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 45% 33%,rgba(255,255,255,.6) 0%,transparent 100%),
        radial-gradient(1px 1px at 65% 78%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 88% 42%,rgba(255,255,255,.8) 0%,transparent 100%),
        radial-gradient(1px 1px at 18% 88%,rgba(255,255,255,.5) 0%,transparent 100%),
        radial-gradient(1px 1px at 55% 8%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 92% 62%,rgba(255,255,255,.7) 0%,transparent 100%),
        radial-gradient(1px 1px at 38% 55%,rgba(255,255,255,.4) 0%,transparent 100%),
        radial-gradient(1px 1px at 72% 22%,rgba(255,255,255,.6) 0%,transparent 100%)}

    /* ── Layout ────────────────────────────────── */
    .wrapper{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 20px 60px}

    /* ── Hero ──────────────────────────────────── */
    .hero{text-align:center;padding:56px 24px 28px}
    .hero .eyebrow{font-family:'Orbitron',sans-serif;font-size:.72rem;letter-spacing:.2em;
      color:var(--cyan);text-transform:uppercase;margin-bottom:12px}
    .hero h1{font-family:'Orbitron',sans-serif;font-size:clamp(1.9rem,5.5vw,3.2rem);font-weight:900;
      background:linear-gradient(135deg,#fff 0%,var(--cyan) 55%,var(--purple) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      line-height:1.15;margin-bottom:14px}
    .hero p{color:var(--muted);max-width:580px;margin:0 auto;font-size:1rem;line-height:1.65}

    /* ── Chat Container ───────────────────────── */
    .chat-container{
      background:var(--card);border:1px solid var(--border);border-radius:var(--r);
      display:flex;flex-direction:column;min-height:500px;max-height:72vh;overflow:hidden;
    }

    /* ── Chat Toolbar ─────────────────────────── */
    .chat-toolbar{
      display:flex;align-items:center;gap:10px;padding:12px 16px;
      border-bottom:1px solid var(--border);flex-wrap:wrap;
    }
    .chat-toolbar .toolbar-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
    .chat-toolbar .toolbar-right{display:flex;align-items:center;gap:8px}

    /* hint toggle */
    .hint-toggle{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--muted)}
    .hint-toggle .toggle-track{
      width:40px;height:22px;border-radius:11px;background:var(--border);
      position:relative;cursor:pointer;transition:background .25s;flex-shrink:0;
    }
    .hint-toggle .toggle-track.on{background:var(--cyan)}
    .hint-toggle .toggle-track::after{
      content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;
      border-radius:50%;background:#fff;transition:transform .25s;
    }
    .hint-toggle .toggle-track.on::after{transform:translateX(18px)}

    .toolbar-btn{
      background:transparent;border:1.5px solid var(--border);border-radius:8px;
      color:var(--muted);padding:6px 12px;font-size:.78rem;cursor:pointer;
      font-family:'Poppins',sans-serif;transition:all .2s;display:flex;align-items:center;gap:5px;
    }
    .toolbar-btn:hover{border-color:var(--cyan);color:var(--cyan)}
    .toolbar-btn.gear-btn{padding:6px 8px;font-size:1rem}

    /* ── Messages Area ────────────────────────── */
    .messages-area{
      flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px;
      scroll-behavior:smooth;
    }
    .messages-area::-webkit-scrollbar{width:6px}
    .messages-area::-webkit-scrollbar-track{background:transparent}
    .messages-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    /* ── Message Bubble ───────────────────────── */
    .message{display:flex;gap:10px;animation:msgSlide .35s ease both}
    .message.user{flex-direction:row-reverse}

    @keyframes msgSlide{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:none}
    }

    .msg-avatar{
      width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:1.1rem;flex-shrink:0;margin-top:2px;
    }
    .message.ai .msg-avatar{background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3)}
    .message.user .msg-avatar{background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.3);font-size:.85rem}

    .msg-bubble{
      max-width:85%;padding:14px 18px;border-radius:14px;font-size:.92rem;line-height:1.7;
      position:relative;
    }
    .message.ai .msg-bubble{
      background:var(--card2);border:1px solid rgba(168,85,247,.25);border-top-left-radius:4px;
    }
    .message.user .msg-bubble{
      background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.25);border-top-right-radius:4px;
    }

    .msg-bubble p{margin:0 0 10px}
    .msg-bubble p:last-child{margin-bottom:0}
    .msg-bubble ul,.msg-bubble ol{margin:6px 0 10px 20px}
    .msg-bubble li{margin-bottom:4px}
    .msg-bubble strong{color:#fff}
    .msg-bubble em{color:var(--cyan)}

    /* code blocks inside messages */
    .msg-bubble pre{
      background:#0a0a18;border:1px solid var(--border);border-radius:8px;
      padding:14px 16px;margin:10px 0;overflow-x:auto;font-family:var(--mono);font-size:.82rem;
      position:relative;
    }
    .msg-bubble code{font-family:var(--mono);font-size:.85rem;color:var(--cyan)}
    .msg-bubble pre code{color:var(--text)}
    .copy-code-btn{
      position:absolute;top:6px;right:6px;background:var(--card2);border:1px solid var(--border);
      color:var(--muted);border-radius:6px;padding:3px 8px;font-size:.68rem;cursor:pointer;
      font-family:'Poppins',sans-serif;transition:all .2s;
    }
    .copy-code-btn:hover{border-color:var(--cyan);color:var(--cyan)}

    /* ── Typing Indicator ─────────────────────── */
    .typing-indicator{display:flex;gap:4px;padding:8px 0}
    .typing-indicator span{
      width:8px;height:8px;border-radius:50%;background:var(--purple);
      animation:typingBounce .6s ease infinite;
    }
    .typing-indicator span:nth-child(2){animation-delay:.15s}
    .typing-indicator span:nth-child(3){animation-delay:.3s}
    @keyframes typingBounce{
      0%,60%,100%{transform:translateY(0);opacity:.4}
      30%{transform:translateY(-6px);opacity:1}
    }

    /* ── Input Area ───────────────────────────── */
    .input-area{
      padding:12px 16px 14px;border-top:1px solid var(--border);background:var(--card);
    }
    .input-row{display:flex;gap:10px;align-items:flex-end}
    .input-row textarea{
      flex:1;background:#0d0d1a;border:1.5px solid var(--border);color:var(--text);
      border-radius:12px;padding:12px 16px;font-family:'Poppins',sans-serif;font-size:.9rem;
      outline:none;transition:border-color .2s;resize:none;max-height:150px;min-height:46px;
      line-height:1.5;overflow-y:auto;
    }
    .input-row textarea:focus{border-color:var(--cyan)}
    .input-row textarea::placeholder{color:var(--muted)}

    .send-btn{
      background:linear-gradient(135deg,var(--cyan),var(--blue));border:none;
      border-radius:12px;padding:12px 18px;cursor:pointer;transition:all .2s;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .send-btn:hover{opacity:.88;transform:translateY(-1px)}
    .send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .send-btn svg{width:20px;height:20px;fill:#fff}

    /* ── Suggested Questions ───────────────────── */
    .suggestions{display:flex;flex-wrap:wrap;gap:8px;padding:8px 0 0}
    .suggestion-btn{
      background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.2);
      border-radius:999px;padding:6px 14px;color:var(--cyan);font-size:.78rem;
      cursor:pointer;font-family:'Poppins',sans-serif;transition:all .2s;
    }
    .suggestion-btn:hover{background:rgba(6,182,212,.15);border-color:var(--cyan)}

    /* ── Settings Panel ───────────────────────── */
    .settings-panel{
      display:none;background:var(--card);border:1px solid var(--border);border-radius:var(--r);
      padding:20px;margin-top:16px;
    }
    .settings-panel.open{display:block;animation:msgSlide .3s ease}
    .settings-panel h3{font-family:'Orbitron',sans-serif;font-size:.95rem;margin-bottom:16px;
      display:flex;align-items:center;gap:8px}
    .settings-field{margin-bottom:14px}
    .settings-field label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:5px;
      letter-spacing:.06em;text-transform:uppercase}
    .settings-field input,.settings-field select{
      width:100%;background:#0d0d1a;border:1.5px solid var(--border);color:var(--text);
      border-radius:10px;padding:10px 14px;font-family:var(--mono);font-size:.88rem;outline:none;
      transition:border-color .2s;
    }
    .settings-field input:focus,.settings-field select:focus{border-color:var(--cyan)}
    .settings-field select option{background:#141428;color:var(--text)}
    .settings-save{
      background:linear-gradient(135deg,var(--cyan),var(--blue));border:none;
      border-radius:10px;padding:10px 24px;color:#fff;font-family:'Poppins',sans-serif;
      font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s;
    }
    .settings-save:hover{opacity:.88;transform:translateY(-1px)}

    /* ── Error Toast ──────────────────────────── */
    .toast{
      position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);
      background:var(--card);border:1.5px solid var(--red);border-radius:10px;
      padding:12px 22px;color:#f87171;font-size:.88rem;z-index:9999;
      transition:transform .35s ease,opacity .35s ease;opacity:0;pointer-events:none;
    }
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
    .toast.success{border-color:var(--green);color:var(--green)}

    /* ── Back-to-top ──────────────────────────── */
    #backToTop{
      display:none;position:fixed;bottom:30px;right:30px;z-index:999;
      background:linear-gradient(135deg,var(--cyan),var(--blue));border:none;
      border-radius:50%;width:44px;height:44px;color:#fff;font-size:1.2rem;
      cursor:pointer;box-shadow:0 4px 18px rgba(6,182,212,.35);transition:all .2s;
    }
    #backToTop:hover{transform:translateY(-2px)}

    /* ── Responsive ────────────────────────────── */
    @media(max-width:640px){
      .wrapper{padding:0 10px 40px}
      .hero{padding:40px 12px 20px}
      .chat-container{max-height:78vh}
      .msg-bubble{max-width:92%;padding:10px 14px;font-size:.86rem}
      .suggestions{gap:6px}
      .suggestion-btn{font-size:.72rem;padding:5px 10px}
      .chat-toolbar{padding:10px 12px}
      .toolbar-btn{font-size:.72rem;padding:5px 8px}
    }
  </style>
</head>
<body>
<div class="stars"></div>
<div id="header-container"></div>
<style>.back-nav{max-width:1300px;margin:20px auto 0;padding:0 24px}.back-nav a{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:rgba(17,17,37,.85);border:1.5px solid var(--border,#1e1e3a);border-radius:10px;color:var(--cyan,#00e5ff);font-family:Poppins,sans-serif;font-size:.95rem;text-decoration:none;transition:all .3s ease;backdrop-filter:blur(6px)}.back-nav a:hover{border-color:var(--cyan,#00e5ff);background:rgba(0,229,255,.08);transform:translateX(-4px)}.back-nav a .arrow{font-size:1.2rem;transition:transform .3s}.back-nav a:hover .arrow{transform:translateX(-4px)}</style>
<div class="back-nav"><a href="tools.html" onclick="sessionStorage.setItem('toolCat','teach')"><span class="arrow">←</span> Back to Teaching Tools</a></div>

<div class="wrapper">
  <!-- Hero -->
  <section class="hero">
    <div class="eyebrow">AI-Powered Tool</div>
    <h1>AI Math Tutor</h1>
    <p>Ask any math question and get step-by-step guidance. Toggle Hint Mode for Socratic learning or full explanations.</p>
  </section>

  <!-- Chat Container -->
  <div class="chat-container" id="chatContainer">
    <!-- Toolbar -->
    <div class="chat-toolbar">
      <div class="toolbar-left">
        <div class="hint-toggle">
          <span>Hint Mode</span>
          <div class="toggle-track on" id="hintToggle" title="Toggle Hint Mode"></div>
        </div>
      </div>
      <div class="toolbar-right">
        <button class="toolbar-btn" id="clearBtn" title="Clear chat">&#128465; Clear</button>
        <button class="toolbar-btn" id="exportBtn" title="Export chat">&#128190; Export</button>
        <button class="toolbar-btn gear-btn" id="gearBtn" title="API Settings">&#9881;</button>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages-area" id="messagesArea"></div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-row">
        <textarea id="userInput" rows="1" placeholder="Ask me any math question..."></textarea>
        <button class="send-btn" id="sendBtn" title="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="suggestions" id="suggestions">
        <button class="suggestion-btn">How do I solve quadratic equations?</button>
        <button class="suggestion-btn">Explain the chain rule</button>
        <button class="suggestion-btn">What is a determinant?</button>
        <button class="suggestion-btn">Help me with integration by parts</button>
        <button class="suggestion-btn">What's the difference between permutation and combination?</button>
      </div>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel">
    <h3>&#9881; API Settings</h3>
    <div class="settings-field">
      <label>API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-...">
    </div>
    <div class="settings-field">
      <label>Model</label>
      <select id="modelSelect">
        <option value="claude-sonnet-4-20250514" selected>claude-sonnet-4-20250514</option>
        <option value="claude-opus-4-20250514">claude-opus-4-20250514</option>
        <option value="claude-haiku-4-20250514">claude-haiku-4-20250514</option>
      </select>
    </div>
    <div class="settings-field">
      <label>API Endpoint</label>
      <input type="text" id="endpointInput" value="https://api.anthropic.com/v1/messages">
    </div>
    <button class="settings-save" id="saveSettingsBtn">Save Settings</button>
  </div>
</div>

<div id="footer-container"></div>
<button id="backToTop" title="Back to top">&#8593;</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ================================================================
   AI Math Tutor – TutorDA
   ================================================================ */

// ── DOM refs ──
const messagesArea   = document.getElementById('messagesArea');
const userInput      = document.getElementById('userInput');
const sendBtn        = document.getElementById('sendBtn');
const clearBtn       = document.getElementById('clearBtn');
const exportBtn      = document.getElementById('exportBtn');
const gearBtn        = document.getElementById('gearBtn');
const settingsPanel  = document.getElementById('settingsPanel');
const apiKeyInput    = document.getElementById('apiKeyInput');
const modelSelect    = document.getElementById('modelSelect');
const endpointInput  = document.getElementById('endpointInput');
const saveSettingsBtn= document.getElementById('saveSettingsBtn');
const hintToggle     = document.getElementById('hintToggle');
const suggestionsBox = document.getElementById('suggestions');
const toastEl        = document.getElementById('toast');

// ── State ──
let conversationHistory = [];
let hintMode = true;
let isGenerating = false;

// ── System prompt builder ──
function buildSystemPrompt() {
  return `You are a friendly, encouraging math tutor. When Hint Mode is ${hintMode ? 'ON' : 'OFF'}: ${
    hintMode
      ? 'Give progressive hints using Socratic questioning — ask guiding questions, give small nudges, never reveal the full answer.'
      : 'Give clear, step-by-step explanations.'
  } Always use LaTeX for math: $ for inline, $$ for display. Be warm, patient, and celebrate when the student gets it right.`;
}

// ── Load settings from localStorage ──
function loadSettings() {
  const saved = localStorage.getItem('mathTutorSettings');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      if (s.apiKey)   apiKeyInput.value   = s.apiKey;
      if (s.model)    modelSelect.value    = s.model;
      if (s.endpoint) endpointInput.value  = s.endpoint;
    } catch(e) {}
  }
}
loadSettings();

// ── Save settings ──
saveSettingsBtn.addEventListener('click', () => {
  localStorage.setItem('mathTutorSettings', JSON.stringify({
    apiKey:   apiKeyInput.value.trim(),
    model:    modelSelect.value,
    endpoint: endpointInput.value.trim()
  }));
  showToast('Settings saved!', true);
});

// ── Toggle settings panel ──
gearBtn.addEventListener('click', () => {
  settingsPanel.classList.toggle('open');
});

// ── Hint mode toggle ──
hintToggle.addEventListener('click', () => {
  hintMode = !hintMode;
  hintToggle.classList.toggle('on', hintMode);
});

// ── Toast ──
let toastTimer = null;
function showToast(msg, success) {
  toastEl.textContent = msg;
  toastEl.className = 'toast' + (success ? ' success' : '');
  void toastEl.offsetWidth;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3500);
}

// ── Markdown-ish renderer ──
function renderMarkdown(text) {
  // Protect LaTeX from markdown processing
  const latexBlocks = [];
  // display math
  text = text.replace(/\$\$([\s\S]*?)\$\$/g, (m) => {
    latexBlocks.push(m);
    return `%%LATEX${latexBlocks.length - 1}%%`;
  });
  // inline math
  text = text.replace(/\$([^\$\n]+?)\$/g, (m) => {
    latexBlocks.push(m);
    return `%%LATEX${latexBlocks.length - 1}%%`;
  });

  // code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code class="lang-${lang}">${escapeHtml(code.trim())}</code><button class="copy-code-btn" onclick="copyCode(this)">Copy</button></pre>`;
  });

  // inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

  // bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // unordered lists
  text = text.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

  // ordered lists
  text = text.replace(/^\d+\.\s(.+)$/gm, '<li>$1</li>');
  // wrap consecutive <li> that are not already in <ul>
  text = text.replace(/(?<!<\/ul>)(<li>.*<\/li>\n?)+/g, (m) => {
    if (m.includes('<ul>')) return m;
    return '<ol>' + m + '</ol>';
  });

  // paragraphs
  text = text.replace(/\n{2,}/g, '</p><p>');
  text = '<p>' + text + '</p>';
  text = text.replace(/<p>\s*<(ul|ol|pre)/g, '<$1');
  text = text.replace(/<\/(ul|ol|pre)>\s*<\/p>/g, '</$1>');

  // line breaks
  text = text.replace(/\n/g, '<br>');

  // Restore LaTeX
  text = text.replace(/%%LATEX(\d+)%%/g, (_, i) => latexBlocks[parseInt(i)]);

  return text;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Copy code helper ──
window.copyCode = function(btn) {
  const code = btn.previousElementSibling.textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
};

// ── Add message to chat ──
function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'message ' + (role === 'user' ? 'user' : 'ai');

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? '🧑' : '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = renderMarkdown(text);

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesArea.appendChild(div);
  scrollToBottom();

  // typeset MathJax
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([bubble]).catch(() => {});
  }
}

function scrollToBottom() {
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

// ── Typing indicator ──
function showTyping() {
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typingMsg';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesArea.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const t = document.getElementById('typingMsg');
  if (t) t.remove();
}

// ── Send message ──
async function sendMessage(text) {
  if (!text.trim() || isGenerating) return;
  text = text.trim();

  // hide suggestions after first message
  suggestionsBox.style.display = 'none';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  userInput.value = '';
  autoGrow();
  isGenerating = true;
  sendBtn.disabled = true;
  showTyping();

  const apiKey   = apiKeyInput.value.trim();
  const model    = modelSelect.value;
  const endpoint = endpointInput.value.trim() || 'https://api.anthropic.com/v1/messages';

  if (!apiKey) {
    hideTyping();
    addMessage('assistant', 'Please set your API key first — click the gear icon (⚙) in the toolbar.');
    isGenerating = false;
    sendBtn.disabled = false;
    return;
  }

  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: model,
        max_tokens: 2048,
        system: buildSystemPrompt(),
        messages: conversationHistory
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API returned ${res.status}`);
    }

    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Sorry, I received an empty response. Please try again.';

    hideTyping();
    addMessage('assistant', reply);
    conversationHistory.push({ role: 'assistant', content: reply });

  } catch (err) {
    hideTyping();
    const errMsg = err.message || 'Unknown error';
    addMessage('assistant', `**Oops!** Something went wrong while contacting the AI.\n\n\`${errMsg}\`\n\nPlease check your API key and settings (gear icon).`);
    showToast('API error — check settings', false);
  } finally {
    isGenerating = false;
    sendBtn.disabled = false;
    userInput.focus();
  }
}

// ── Send button ──
sendBtn.addEventListener('click', () => sendMessage(userInput.value));

// ── Enter to send, Shift+Enter for newline ──
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(userInput.value);
  }
});

// ── Auto-grow textarea ──
function autoGrow() {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 150) + 'px';
}
userInput.addEventListener('input', autoGrow);

// ── Suggestion buttons ──
suggestionsBox.addEventListener('click', (e) => {
  if (e.target.classList.contains('suggestion-btn')) {
    sendMessage(e.target.textContent);
  }
});

// ── Clear chat ──
clearBtn.addEventListener('click', () => {
  conversationHistory = [];
  messagesArea.innerHTML = '';
  suggestionsBox.style.display = 'flex';
  addWelcome();
});

// ── Export chat ──
exportBtn.addEventListener('click', () => {
  if (conversationHistory.length === 0) {
    showToast('Nothing to export yet!', false);
    return;
  }
  let txt = 'AI Math Tutor — Chat Export\n';
  txt += '='.repeat(40) + '\n\n';
  conversationHistory.forEach(m => {
    const label = m.role === 'user' ? 'You' : 'AI Tutor';
    txt += `[${label}]\n${m.content}\n\n`;
  });
  const blob = new Blob([txt], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'math-tutor-chat.txt';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Chat exported!', true);
});

// ── Welcome message ──
function addWelcome() {
  addMessage('assistant', "Hi! I'm your AI Math Tutor. Ask me any math question and I'll guide you step-by-step with hints. I won't just give you the answer — I'll help you understand! 🧠");
}
addWelcome();

// ── Back to Top ──
const btt = document.getElementById('backToTop');
if (btt) {
  window.addEventListener('scroll', () => btt.style.display = window.scrollY > 300 ? 'block' : 'none');
  btt.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
}

// ── Load header/footer ──
fetch('../components/header.html').then(r=>r.text()).then(h=>document.getElementById('header-container').innerHTML=h).catch(()=>{});
fetch('../components/footer.html').then(r=>r.text()).then(h=>document.getElementById('footer-container').innerHTML=h).catch(()=>{});
</script>
</body>
