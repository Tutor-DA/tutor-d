<style>
:root{--cyan:#00e5ff;--purple:#a855f7;--pink:#ec4899;--gold:#facc15;--card:#111125;--border:#1e1e3a;--muted:#94a3b8;--r:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#e8e8ff;font-family:'Poppins',sans-serif;min-height:100vh}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(2px 2px at 20px 30px,#ffffff22,transparent),radial-gradient(2px 2px at 40px 70px,#ffffff11,transparent);background-size:200px 200px;z-index:0;pointer-events:none}
.back-nav{max-width:1300px;margin:20px auto 0;padding:0 24px;position:relative;z-index:1}
.back-nav a{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:rgba(17,17,37,.85);border:1.5px solid var(--border);border-radius:10px;color:var(--cyan);font-family:Poppins,sans-serif;font-size:.95rem;text-decoration:none;transition:all .3s}
.back-nav a:hover{border-color:var(--cyan);transform:translateX(-4px)}
.wrapper{max-width:1000px;margin:0 auto;padding:30px 24px;position:relative;z-index:1}
h1{font-family:'Orbitron',sans-serif;font-size:2rem;text-align:center;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.subtitle{text-align:center;color:var(--muted);margin-bottom:20px;font-size:.9rem}
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-bar input{flex:1;padding:12px 16px;background:rgba(17,17,37,.8);border:2px solid var(--border);border-radius:12px;color:#e8e8ff;font-family:Poppins;font-size:.95rem;outline:none}
.search-bar input:focus{border-color:var(--cyan)}
.btn{padding:10px 20px;border:1.5px solid var(--border);border-radius:10px;background:transparent;color:#e8e8ff;font-family:Poppins;font-size:.85rem;cursor:pointer;transition:all .2s}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-primary{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#0d0d1a;border:none;font-weight:600}
.az-strip{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;justify-content:center}
.az-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.az-btn:hover,.az-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.08)}
.topic-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.topic-chip{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:.75rem;color:var(--muted);cursor:pointer;transition:all .2s}
.topic-chip:hover,.topic-chip.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.08)}
.term-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px;transition:border-color .2s}
.term-card:hover{border-color:rgba(0,229,255,.3)}
.term-name{font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--cyan);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.term-def{font-size:.85rem;color:#c8c8ff;margin-bottom:8px;line-height:1.5}
.term-formula{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--purple);background:rgba(168,85,247,.08);padding:8px 12px;border-radius:8px;margin-bottom:8px}
.term-example{font-size:.8rem;color:var(--muted);font-style:italic}
.term-topic{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.65rem;text-transform:uppercase;letter-spacing:.05em}
.bookmark-btn{cursor:pointer;font-size:1.1rem;transition:transform .2s}
.bookmark-btn:hover{transform:scale(1.3)}
.letter-header{font-family:'Orbitron',sans-serif;font-size:1.5rem;color:var(--purple);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.count-badge{font-size:.8rem;color:var(--muted);text-align:center;margin-bottom:16px}
@media(max-width:600px){h1{font-size:1.5rem}.az-btn{width:26px;height:26px;font-size:.65rem}}
</style>

{name:'Chain Rule',def:'Derivative of a composite function.',formula:'$\\frac{d}{dx}f(g(x)) = f\'(g(x))\\cdot g\'(x)$',example:'d/dx(sin(3x)) = 3cos(3x)',topic:'Calculus'},
{name:'Definite Integral',def:'Integral with bounds giving a numerical value.',formula:'$\\int_a^b f(x)\\,dx = F(b)-F(a)$',example:'$\\int_0^1 x^2\\,dx = 1/3$',topic:'Calculus'},
{name:'Fundamental Theorem',def:'Links differentiation and integration.',formula:'$\\frac{d}{dx}\\int_a^x f(t)\\,dt = f(x)$',example:'Integration reverses differentiation',topic:'Calculus'},
{name:'Mean Value Theorem',def:'There exists a point where the tangent equals the secant slope.',formula:'$f\'(c) = \\frac{f(b)-f(a)}{b-a}$',example:'Exists c in (a,b)',topic:'Calculus'},
{name:'Critical Point',def:'A point where f\'(x) = 0 or is undefined.',formula:'f\'(c) = 0',example:'f(x) = x²: critical point at x = 0',topic:'Calculus'},
{name:'Inflection Point',def:'A point where concavity changes.',formula:'f\'\'(x) = 0 and changes sign',example:'f(x) = x³ at x = 0',topic:'Calculus'},
{name:'Taylor Series',def:'Infinite polynomial approximation of a function.',formula:'$f(x) = \\sum \\frac{f^{(n)}(a)}{n!}(x-a)^n$',example:'$e^x = 1 + x + x²/2! + ...$',topic:'Calculus'},
{name:'Convergence',def:'A series or sequence approaches a finite value.',formula:'',example:'1 + 1/2 + 1/4 + ... → 2',topic:'Calculus'},
{name:'Divergence',def:'A series or sequence does not approach a finite value.',formula:'',example:'1 + 1 + 1 + ... → ∞',topic:'Calculus'},
{name:"L'Hôpital's Rule",def:'Evaluate limits of indeterminate forms.',formula:'$\\lim\\frac{f}{g} = \\lim\\frac{f\'}{g\'}$',example:'lim(sin x / x) as x→0',topic:'Calculus'},
{name:'Antiderivative',def:'A function whose derivative is the given function.',formula:'F\'(x) = f(x)',example:'Antiderivative of 2x is x²+C',topic:'Calculus'},
{name:'Integration by Parts',def:'Integration technique for products.',formula:'$\\int u\\,dv = uv - \\int v\\,du$',example:'∫x·eˣ dx',topic:'Calculus'},
{name:'U-Substitution',def:'Integration technique using substitution.',formula:'$\\int f(g(x))g\'(x)\\,dx$',example:'∫2x·cos(x²) dx, let u = x²',topic:'Calculus'},
// Statistics (20)
{name:'Mean',def:'The average of a set of numbers.',formula:'$\\bar{x} = \\frac{\\sum x_i}{n}$',example:'Mean of 2,4,6 = 4',topic:'Statistics'},
{name:'Median',def:'The middle value when data is sorted.',formula:'',example:'Median of 1,3,5,7,9 = 5',topic:'Statistics'},
{name:'Mode',def:'The most frequently occurring value.',formula:'',example:'Mode of 1,2,2,3 = 2',topic:'Statistics'},
{name:'Range',def:'Difference between the largest and smallest values.',formula:'Range = max - min',example:'Range of 3,7,12 = 9',topic:'Statistics'},
{name:'Variance',def:'Average of squared deviations from the mean.',formula:'$\\sigma^2 = \\frac{\\sum(x_i-\\bar{x})^2}{n}$',example:'Measures spread of data',topic:'Statistics'},
{name:'Standard Deviation',def:'Square root of variance; measures spread.',formula:'$\\sigma = \\sqrt{\\text{variance}}$',example:'σ = 2.5 means data varies ±2.5 from mean',topic:'Statistics'},
{name:'Probability',def:'Likelihood of an event occurring, from 0 to 1.',formula:'$P(A) = \\frac{\\text{favorable}}{\\text{total}}$',example:'P(heads) = 1/2',topic:'Statistics'},
{name:'Normal Distribution',def:'Bell-shaped probability distribution.',formula:'$f(x) = \\frac{1}{\\sigma\\sqrt{2\\pi}}e^{-\\frac{(x-\\mu)^2}{2\\sigma^2}}$',example:'IQ scores follow normal distribution',topic:'Statistics'},
{name:'Z-Score',def:'Number of standard deviations from the mean.',formula:'$z = \\frac{x - \\mu}{\\sigma}$',example:'x = 85, μ = 75, σ = 5: z = 2',topic:'Statistics'},
{name:'Correlation',def:'Measure of linear relationship between two variables.',formula:'r ∈ [-1, 1]',example:'r = 0.95 is strong positive',topic:'Statistics'},
{name:'Regression',def:'Finding the best-fit line through data.',formula:'$y = mx + b$',example:'Predicting y from x',topic:'Statistics'},
{name:'Combination',def:'Number of ways to choose k items from n without order.',formula:'$C(n,k) = \\frac{n!}{k!(n-k)!}$',example:'C(5,2) = 10',topic:'Statistics'},
{name:'Permutation',def:'Number of ways to arrange k items from n with order.',formula:'$P(n,k) = \\frac{n!}{(n-k)!}$',example:'P(5,2) = 20',topic:'Statistics'},
{name:'Expected Value',def:'The long-run average of a random variable.',formula:'$E(X) = \\sum x_i \\cdot P(x_i)$',example:'Fair die: E(X) = 3.5',topic:'Statistics'},
{name:'Binomial Distribution',def:'Probability of k successes in n trials.',formula:'$P(k) = C(n,k)p^k(1-p)^{n-k}$',example:'Coin flips',topic:'Statistics'},
{name:'Confidence Interval',def:'Range likely to contain the true population parameter.',formula:'$\\bar{x} \\pm z\\frac{\\sigma}{\\sqrt{n}}$',example:'95% CI: mean ± 1.96·SE',topic:'Statistics'},
{name:'Hypothesis Testing',def:'Procedure to test claims about population parameters.',formula:'H₀ vs H₁',example:'Testing if a coin is fair',topic:'Statistics'},
{name:'Outlier',def:'A data point significantly different from others.',formula:'',example:'In {2,3,4,5,100}, 100 is an outlier',topic:'Statistics'},
{name:'Sample',def:'A subset of a population used for analysis.',formula:'',example:'Surveying 100 out of 10000 students',topic:'Statistics'},
{name:'Population',def:'The entire group being studied.',formula:'N',example:'All students in a university',topic:'Statistics'}
];

let bookmarks=JSON.parse(localStorage.getItem('dict_bookmarks')||'[]');
let activeFilter='All',activeLetter='';

function init(){
  // A-Z strip
  const az=document.getElementById('az-strip');
  let azHtml='<button class="az-btn active" onclick="filterLetter(\'\',this)">All</button>';
  for(let i=65;i<=90;i++)azHtml+='<button class="az-btn" onclick="filterLetter(\''+String.fromCharCode(i)+'\',this)">'+String.fromCharCode(i)+'</button>';
  az.innerHTML=azHtml;
  // Topics
  const topics=['All',...new Set(terms.map(t=>t.topic))];
  document.getElementById('topic-filter').innerHTML=topics.map(t=>'<span class="topic-chip'+(t==='All'?' active':'')+'" onclick="filterTopic(\''+t+'\',this)">'+t+'</span>').join('');
  renderTerms();
}

function filterTerms(){
  renderTerms();
}

function filterLetter(l,btn){
  activeLetter=l;
  document.querySelectorAll('.az-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTerms();
}

function filterTopic(t,btn){
  activeFilter=t;
  document.querySelectorAll('.topic-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTerms();
}

function renderTerms(){
  const search=document.getElementById('search').value.toLowerCase();
  let filtered=terms.filter(t=>{
    if(activeLetter&&!t.name.toUpperCase().startsWith(activeLetter))return false;
    if(activeFilter!=='All'&&t.topic!==activeFilter)return false;
    if(search&&!t.name.toLowerCase().includes(search)&&!t.def.toLowerCase().includes(search))return false;
    return true;
  });
  document.getElementById('count-badge').textContent='Showing '+filtered.length+' of '+terms.length+' terms';

  // Group by letter
  let html='';let lastLetter='';
  filtered.sort((a,b)=>a.name.localeCompare(b.name));
  filtered.forEach(t=>{
    const first=t.name[0].toUpperCase();
    if(first!==lastLetter&&!search){lastLetter=first;html+='<div class="letter-header" id="letter-'+first+'">'+first+'</div>'}
    const isBookmarked=bookmarks.includes(t.name);
    const color=topicColors[t.topic]||'#94a3b8';
    html+='<div class="term-card">';
    html+='<div class="term-name"><span class="bookmark-btn" onclick="toggleBookmark(\''+t.name.replace(/'/g,"\\'")+'\',this)">'+(isBookmarked?'⭐':'☆')+'</span>'+t.name+'<span class="term-topic" style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44">'+t.topic+'</span></div>';
    html+='<div class="term-def">'+t.def+'</div>';
    if(t.formula)html+='<div class="term-formula">'+t.formula+'</div>';
    if(t.example)html+='<div class="term-example">Example: '+t.example+'</div>';
    html+='</div>';
  });
  document.getElementById('terms-container').innerHTML=html;
  if(window.MathJax)MathJax.typesetPromise();
}

function toggleBookmark(name,btn){
  const idx=bookmarks.indexOf(name);
  if(idx>=0)bookmarks.splice(idx,1);else bookmarks.push(name);
  localStorage.setItem('dict_bookmarks',JSON.stringify(bookmarks));
  btn.textContent=bookmarks.includes(name)?'⭐':'☆';
}

function randomTerm(){
  const t=terms[Math.floor(Math.random()*terms.length)];
  document.getElementById('search').value=t.name;
  filterTerms();
  window.scrollTo({top:200,behavior:'smooth'});
}

init();
</script>

</html>
