<body>
<div class="stars"></div>
<div id="header-container"></div>
<div class="back-nav"><a href="tools.html" onclick="sessionStorage.setItem('toolCat','learn')"><span class="arrow">←</span> Back to Learning Tools</a></div>
<div class="wrapper">
<h1>⚖ Ratio & Proportion</h1>
<p class="subtitle">Simplify ratios, solve proportions, divide quantities, and explore the golden ratio</p>
<div class="tabs">
  <button class="tab-btn active" onclick="sw('simplify',this)">Simplify</button>
  <button class="tab-btn" onclick="sw('proportion',this)">Proportion</button>
  <button class="tab-btn" onclick="sw('divide',this)">Divide</button>
  <button class="tab-btn" onclick="sw('golden',this)">Golden Ratio</button>
  <button class="tab-btn" onclick="sw('recipe',this)">Recipe</button>
  <button class="tab-btn" onclick="sw('unitrate',this)">Unit Rate</button>
</div>

<!-- SIMPLIFY -->
<div class="tab-content active" id="tab-simplify">
<div class="card">
  <div class="input-row">
    <div class="input-group"><label>Ratio (e.g. 12:18:24)</label><input id="ratio-in" value="12:18:24"></div>
    <button class="btn btn-primary" onclick="simplifyRatio()">Simplify</button>
  </div>
  <div id="simplify-result"></div>
</div>
</div>

<!-- PROPORTION -->
<div class="tab-content" id="tab-proportion">
<div class="card">
  <p style="color:var(--muted);font-size:.85rem;margin-bottom:12px">Leave one blank to solve: a/b = c/d</p>
  <div class="input-row">
    <div class="input-group"><label>a</label><input id="pa" value="3"></div>
    <div style="font-size:1.5rem;color:var(--muted);padding:8px">/</div>
    <div class="input-group"><label>b</label><input id="pb" value="4"></div>
    <div style="font-size:1.5rem;color:var(--muted);padding:8px">=</div>
    <div class="input-group"><label>c</label><input id="pc" value=""></div>
    <div style="font-size:1.5rem;color:var(--muted);padding:8px">/</div>
    <div class="input-group"><label>d</label><input id="pd" value="20"></div>
    <button class="btn btn-primary" onclick="solveProportion()">Solve</button>
  </div>
  <div id="proportion-result"></div>
</div>
</div>

<!-- DIVIDE -->
<div class="tab-content" id="tab-divide">
<div class="card">
  <div class="input-row">
    <div class="input-group"><label>Total Amount</label><input id="div-total" value="120"></div>
    <div class="input-group"><label>Ratio (e.g. 2:3:5)</label><input id="div-ratio" value="2:3:5"></div>
    <button class="btn btn-primary" onclick="divideInRatio()">Divide</button>
  </div>
  <div id="divide-result"></div>
  <canvas id="pie-canvas" width="300" height="300" style="display:none"></canvas>
</div>
</div>

<!-- GOLDEN -->
<div class="tab-content" id="tab-golden">
<div class="card">
  <div class="input-row">
    <div class="input-group"><label>Value</label><input id="gold-val" value="100"></div>
    <button class="btn btn-primary" onclick="calcGolden()">Calculate</button>
  </div>
  <div id="golden-result"></div>
  <canvas id="golden-canvas" width="500" height="320" style="display:none"></canvas>
</div>
</div>

<!-- RECIPE -->
<div class="tab-content" id="tab-recipe">
<div class="card">
  <div class="input-row">
    <div class="input-group"><label>Original Servings</label><input id="rec-orig" type="number" value="4"></div>
    <div class="input-group"><label>New Servings</label><input id="rec-new" type="number" value="6"></div>
  </div>
  <div id="recipe-items">
    <div class="recipe-row"><input placeholder="Ingredient" value="Flour"><input type="number" placeholder="Amount" value="2"><input placeholder="Unit" value="cups"><button class="btn" onclick="this.parentElement.remove()" style="padding:6px 10px">✕</button></div>
    <div class="recipe-row"><input placeholder="Ingredient" value="Sugar"><input type="number" placeholder="Amount" value="1"><input placeholder="Unit" value="cup"><button class="btn" onclick="this.parentElement.remove()" style="padding:6px 10px">✕</button></div>
    <div class="recipe-row"><input placeholder="Ingredient" value="Eggs"><input type="number" placeholder="Amount" value="3"><input placeholder="Unit" value=""><button class="btn" onclick="this.parentElement.remove()" style="padding:6px 10px">✕</button></div>
  </div>
  <div style="display:flex;gap:8px;margin-top:8px">
    <button class="btn" onclick="addRecipeRow()">+ Add Ingredient</button>
    <button class="btn btn-primary" onclick="scaleRecipe()">Scale Recipe</button>
  </div>
  <div id="recipe-result"></div>
</div>
</div>

<!-- UNIT RATE -->
<div class="tab-content" id="tab-unitrate">
<div class="card">
  <p style="color:var(--muted);font-size:.85rem;margin-bottom:12px">Compare prices to find the best deal</p>
  <div id="rate-items">
    <div class="input-row"><div class="input-group"><label>Item</label><input value="Brand A"></div><div class="input-group"><label>Price ($)</label><input type="number" value="4.50"></div><div class="input-group"><label>Quantity</label><input type="number" value="500"></div><div class="input-group"><label>Unit</label><input value="g"></div></div>
    <div class="input-row"><div class="input-group"><label>Item</label><input value="Brand B"></div><div class="input-group"><label>Price ($)</label><input type="number" value="7.20"></div><div class="input-group"><label>Quantity</label><input type="number" value="1000"></div><div class="input-group"><label>Unit</label><input value="g"></div></div>
  </div>
  <div style="display:flex;gap:8px;margin-top:8px">
    <button class="btn" onclick="addRateRow()">+ Add Item</button>
    <button class="btn btn-primary" onclick="compareRates()">Compare</button>
  </div>
  <div id="rate-result"></div>
</div>

<script>
fetch('../components/header.html').then(r=>r.text()).then(h=>{var c=document.getElementById('header-container');c.innerHTML=h;c.querySelectorAll('script').forEach(s=>{var n=document.createElement('script');n.textContent=s.textContent;document.body.appendChild(n)})}).catch(()=>{});
fetch('../components/footer.html').then(r=>r.text()).then(h=>document.getElementById('footer-container').innerHTML=h).catch(()=>{});

function sw(id,btn){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active');btn.classList.add('active')}

function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b]}return a}
function gcdArr(arr){return arr.reduce((a,b)=>gcd(a,b))}

function simplifyRatio(){
  const parts=document.getElementById('ratio-in').value.split(':').map(Number).filter(n=>!isNaN(n)&&n>0);
  if(parts.length<2)return;
  const g=gcdArr(parts);
  const simplified=parts.map(p=>p/g);
  const colors=['#00e5ff','#a855f7','#ec4899','#facc15','#22c55e'];
  const total=parts.reduce((a,b)=>a+b,0);
  let html='<div class="result-box">';
  html+='<div class="step">Original: '+parts.join(' : ')+'</div>';
  html+='<div class="step">GCD = '+g+'</div>';
  html+='<div class="step">Divide each by '+g+': '+simplified.join(' : ')+'</div>';
  html+='<div style="font-family:Orbitron;font-size:1.3rem;color:var(--cyan);text-align:center;margin:16px 0">'+simplified.join(' : ')+'</div>';
  html+='<div class="bar-row">';
  parts.forEach((p,i)=>{html+='<div class="bar-segment" style="flex:'+p+';background:'+colors[i%5]+'">'+p+'</div>'});
  html+='</div></div>';
  document.getElementById('simplify-result').innerHTML=html;
  if(window.MathJax)MathJax.typesetPromise();
}

function solveProportion(){
  let a=document.getElementById('pa').value,b=document.getElementById('pb').value,c=document.getElementById('pc').value,d=document.getElementById('pd').value;
  let missing='',result;
  if(!a){missing='a';result=(b*c/d);a=result}
  else if(!b){missing='b';result=(a*d/c);b=result}
  else if(!c){missing='c';result=(a*d/b);c=result}
  else if(!d){missing='d';result=(b*c/a);d=result}
  else return;
  const r=Math.round(result*100)/100;
  let html='<div class="result-box">';
  html+='<div class="step">$\\frac{'+a+'}{'+b+'} = \\frac{'+c+'}{'+d+'}$</div>';
  html+='<div class="step">Cross multiply: '+a+' × '+d+' = '+b+' × '+c+'</div>';
  html+='<div class="step">'+missing+' = '+r+'</div>';
  html+='<div style="font-family:Orbitron;font-size:1.5rem;color:var(--gold);text-align:center;margin:12px 0">'+missing+' = '+r+'</div>';
  html+='</div>';
  document.getElementById('proportion-result').innerHTML=html;
  if(window.MathJax)MathJax.typesetPromise();
}

function divideInRatio(){
  const total=parseFloat(document.getElementById('div-total').value);
  const parts=document.getElementById('div-ratio').value.split(':').map(Number).filter(n=>!isNaN(n));
  if(!total||parts.length<2)return;
  const sum=parts.reduce((a,b)=>a+b,0);
  const shares=parts.map(p=>Math.round(total*p/sum*100)/100);
  const colors=['#00e5ff','#a855f7','#ec4899','#facc15','#22c55e'];
  let html='<div class="result-box">';
  html+='<div class="step">Total parts: '+parts.join(' + ')+' = '+sum+'</div>';
  html+='<div class="step">Each part = '+total+' ÷ '+sum+' = '+(Math.round(total/sum*100)/100)+'</div>';
  parts.forEach((p,i)=>{html+='<div class="step" style="border-color:'+colors[i%5]+'">Share '+(i+1)+': '+p+' × '+(Math.round(total/sum*100)/100)+' = <strong>'+shares[i]+'</strong></div>'});
  html+='</div>';
  document.getElementById('divide-result').innerHTML=html;
  // Pie chart
  const canvas=document.getElementById('pie-canvas');canvas.style.display='block';
  const ctx=canvas.getContext('2d');ctx.clearRect(0,0,300,300);
  let angle=-.5*Math.PI;
  parts.forEach((p,i)=>{
    const slice=2*Math.PI*p/sum;
    ctx.beginPath();ctx.moveTo(150,150);ctx.arc(150,150,120,angle,angle+slice);ctx.fillStyle=colors[i%5];ctx.fill();
    const mid=angle+slice/2;
    ctx.fillStyle='#0d0d1a';ctx.font='bold 14px Poppins';ctx.textAlign='center';
    ctx.fillText(shares[i],150+80*Math.cos(mid),150+80*Math.sin(mid)+5);
    angle+=slice;
  });
}

function calcGolden(){
  const v=parseFloat(document.getElementById('gold-val').value);if(!v)return;
  const phi=1.6180339887;
  const larger=Math.round(v*phi*100)/100;
  const smaller=Math.round(v/phi*100)/100;
  let html='<div class="result-box">';
  html+='<div style="text-align:center;font-size:1.2rem;color:var(--gold);margin-bottom:12px">φ (phi) = 1.6180339887...</div>';
  html+='<div class="step">'+v+' × φ = <strong>'+larger+'</strong> (golden ratio larger)</div>';
  html+='<div class="step">'+v+' ÷ φ = <strong>'+smaller+'</strong> (golden ratio smaller)</div>';
  html+='<div class="step">Check: '+larger+' ÷ '+v+' ≈ '+(Math.round(larger/v*1000)/1000)+' ≈ φ ✓</div>';
  html+='</div>';
  document.getElementById('golden-result').innerHTML=html;
  // Draw golden rectangle + spiral
  const canvas=document.getElementById('golden-canvas');canvas.style.display='block';
  const ctx=canvas.getContext('2d');ctx.clearRect(0,0,500,320);
  ctx.strokeStyle='var(--gold)';ctx.lineWidth=2;
  let x=20,y=20,w=280,h=w/phi;
  ctx.strokeRect(x,y,w,h);
  ctx.strokeStyle='rgba(0,229,255,.5)';
  // Subdivide
  for(let i=0;i<6;i++){
    const sq=Math.min(w,h);
    ctx.strokeRect(x,y,sq,sq);
    ctx.beginPath();
    if(i%4===0){ctx.arc(x+sq,y+sq,sq,Math.PI,1.5*Math.PI)}
    else if(i%4===1){ctx.arc(x,y+sq,sq,1.5*Math.PI,2*Math.PI)}
    else if(i%4===2){ctx.arc(x,y,sq,0,.5*Math.PI)}
    else{ctx.arc(x+sq,y,sq,.5*Math.PI,Math.PI)}
    ctx.strokeStyle='#facc15';ctx.stroke();ctx.strokeStyle='rgba(0,229,255,.3)';
    if(i%4===0){x+=sq;w-=sq}else if(i%4===1){y+=sq;h-=sq}else if(i%4===2){w-=sq}else{h-=sq}
  }
  if(window.MathJax)MathJax.typesetPromise();
}

function addRecipeRow(){
  const div=document.createElement('div');div.className='recipe-row';
  div.innerHTML='<input placeholder="Ingredient"><input type="number" placeholder="Amount"><input placeholder="Unit"><button class="btn" onclick="this.parentElement.remove()" style="padding:6px 10px">✕</button>';
  document.getElementById('recipe-items').appendChild(div);
}

function scaleRecipe(){
  const orig=parseFloat(document.getElementById('rec-orig').value);
  const newS=parseFloat(document.getElementById('rec-new').value);
  if(!orig||!newS)return;
  const factor=newS/orig;
  const rows=document.querySelectorAll('#recipe-items .recipe-row');
  let html='<div class="result-box"><div style="font-size:.85rem;color:var(--muted);margin-bottom:8px">Scale factor: ×'+Math.round(factor*100)/100+'</div><table style="width:100%;font-size:.85rem"><tr style="color:var(--muted)"><th style="text-align:left">Ingredient</th><th>Original</th><th>Scaled</th></tr>';
  rows.forEach(r=>{
    const inputs=r.querySelectorAll('input');
    const name=inputs[0].value||'?';
    const amt=parseFloat(inputs[1].value)||0;
    const unit=inputs[2].value||'';
    const scaled=Math.round(amt*factor*100)/100;
    html+='<tr><td>'+name+'</td><td style="text-align:center">'+amt+' '+unit+'</td><td style="text-align:center;color:var(--cyan);font-weight:600">'+scaled+' '+unit+'</td></tr>';
  });
  html+='</table></div>';
  document.getElementById('recipe-result').innerHTML=html;
}

function addRateRow(){
  const html='<div class="input-row"><div class="input-group"><label>Item</label><input value=""></div><div class="input-group"><label>Price ($)</label><input type="number"></div><div class="input-group"><label>Quantity</label><input type="number"></div><div class="input-group"><label>Unit</label><input></div></div>';
  document.getElementById('rate-items').insertAdjacentHTML('beforeend',html);
}

function compareRates(){
  const rows=document.querySelectorAll('#rate-items .input-row');
  const items=[];
  rows.forEach(r=>{
    const inputs=r.querySelectorAll('input');
    const name=inputs[0].value||'Item';
    const price=parseFloat(inputs[1].value)||0;
    const qty=parseFloat(inputs[2].value)||1;
    const unit=inputs[3].value||'unit';
    items.push({name,price,qty,unit,rate:price/qty});
  });
  if(items.length<2)return;
  items.sort((a,b)=>a.rate-b.rate);
  let html='<div class="result-box">';
  items.forEach((item,i)=>{
    const isBest=i===0;
    html+='<div class="step" style="border-color:'+(isBest?'var(--gold)':'var(--border)')+'"><strong>'+item.name+'</strong>: $'+item.price+' for '+item.qty+item.unit+' = <span style="color:'+(isBest?'var(--gold)':'var(--cyan)')+'">$'+(Math.round(item.rate*10000)/10000)+'/'+item.unit+'</span>'+(isBest?' ⭐ Best Deal!':'')+'</div>';
  });
  if(items.length>1){
    const savings=((items[1].rate-items[0].rate)/items[1].rate*100).toFixed(1);
    html+='<div style="text-align:center;color:var(--gold);margin-top:12px">💰 '+items[0].name+' saves '+savings+'% per '+items[0].unit+'</div>';
  }
  html+='</div>';
  document.getElementById('rate-result').innerHTML=html;
}
</script>
</body>
</html>
